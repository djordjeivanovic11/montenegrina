name: montenegrina

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: montenegrina
      POSTGRES_USER: montenegrina
      POSTGRES_PASSWORD: montenegrina
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U montenegrina -d montenegrina']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-montenegrina}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-local-minio-secret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-montenegrina}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-local-minio-secret}
      S3_BUCKET: ${S3_BUCKET:-montenegrina}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc anonymous set none "local/$${S3_BUCKET}"

  livekit:
    image: livekit/livekit-server:v1.9.10
    command: ['--config', '/etc/livekit.yaml']
    environment:
      NODE_IP: '127.0.0.1'
    volumes:
      - ./infra/docker/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
      - '40000-40100:40000-40100/udp'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:7880']
      interval: 5s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.137.0
    command: ['--config=/etc/otelcol/config.yaml']
    volumes:
      - ./infra/docker/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
      - '8889:8889'
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v3.6.0
    command: ['--config.file=/etc/prometheus/prometheus.yaml']
    volumes:
      - ./infra/docker/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    ports:
      - '9090:9090'
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:12.1.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: local-grafana-admin
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - ./infra/docker/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3002:3000'
    depends_on:
      - prometheus
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686'

  knowledge-parser:
    build:
      context: .
      dockerfile: apps/knowledge-parser/Dockerfile
    environment:
      KNOWLEDGE_PARSER_PORT: 8090
    ports:
      - '8090:8090'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8090/health']
      interval: 15s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: ['pnpm', 'db:migrate']
    env_file:
      - path: .env.development
        required: false
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: ['pnpm', 'db:seed']
    env_file:
      - path: .env.development
        required: false
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env.development
        required: false
    environment:
      NODE_ENV: development
      KNOWLEDGE_PARSER_URL: http://knowledge-parser:8090
      S3_ENDPOINT: http://minio:9000
      RATE_LIMIT_VOICE_SESSIONS_PER_HOUR: ${RATE_LIMIT_VOICE_SESSIONS_PER_HOUR:-60}
    ports:
      - '3001:3001'
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      livekit:
        condition: service_healthy
      knowledge-parser:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - path: .env.development
        required: false
    environment:
      NODE_ENV: development
      KNOWLEDGE_PARSER_URL: http://knowledge-parser:8090
      S3_ENDPOINT: http://minio:9000
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      knowledge-parser:
        condition: service_healthy

  voice-agent:
    build:
      context: .
      dockerfile: apps/voice-agent/Dockerfile
    env_file:
      - path: .env.development
        required: false
    environment:
      INTERNAL_API_URL: http://api:3001
      VOICE_AGENT_SERVICE_SECRET: ${VOICE_AGENT_SERVICE_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
      livekit:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_LIVEKIT_URL: ${PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${PUBLIC_GOOGLE_CLIENT_ID:-}
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_LIVEKIT_URL: ${PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:
  grafana-data:
