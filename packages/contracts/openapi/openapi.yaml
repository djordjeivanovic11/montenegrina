openapi: 3.1.0
info:
  title: Montenegrina API
  version: 0.1.0
  description: Provider-independent Montenegrin conversational-AI control and data plane.
servers:
  - url: http://localhost:3001
security:
  - apiKey: []
  - sessionCookie: []
tags:
  - name: Health
  - name: Authentication
  - name: Organizations
  - name: Agents
  - name: Conversations
  - name: Providers
  - name: Knowledge
  - name: Tools
  - name: Evaluations
paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Health]
      security: []
      responses:
        '200': { $ref: '#/components/responses/Health' }
  /health/ready:
    get:
      operationId: getReadiness
      tags: [Health]
      security: []
      responses:
        '200': { $ref: '#/components/responses/Health' }
        '503': { $ref: '#/components/responses/Error' }
  /v1/auth/login:
    post:
      operationId: login
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { $ref: '#/components/responses/Session' }
        '401': { $ref: '#/components/responses/Error' }
  /v1/auth/logout:
    post:
      operationId: logout
      tags: [Authentication]
      responses:
        '204': { description: Session removed }
  /v1/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      responses:
        '200': { $ref: '#/components/responses/Session' }
        '401': { $ref: '#/components/responses/Error' }
  /v1/organizations:
    get:
      operationId: listOrganizations
      tags: [Organizations]
      responses:
        '200': { $ref: '#/components/responses/OrganizationList' }
    post:
      operationId: createOrganization
      tags: [Organizations]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrganizationRequest' }
      responses:
        '201': { $ref: '#/components/responses/Organization' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/organizations/{organizationId}:
    delete:
      operationId: deleteOrganization
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { $ref: '#/components/responses/Deletion' }
        '403': { $ref: '#/components/responses/Error' }
  /v1/organizations/{organizationId}/memberships:
    get:
      operationId: listMemberships
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Memberships
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Membership' }
    post:
      operationId: createMembership
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { $ref: '#/components/schemas/MembershipRole' }
      responses:
        '201':
          description: Membership created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Membership' }
  /v1/api-keys:
    post:
      operationId: createApiKey
      tags: [Organizations]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateApiKeyRequest' }
      responses:
        '201':
          description: API key shown once
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyCreated' }
  /v1/agents:
    get:
      operationId: listAgents
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { $ref: '#/components/responses/AgentList' }
    post:
      operationId: createAgent
      tags: [Agents]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAgentRequest' }
      responses:
        '201': { $ref: '#/components/responses/Agent' }
        '400': { $ref: '#/components/responses/Error' }
  /v1/agents/{agentId}:
    get:
      operationId: getAgent
      tags: [Agents]
      parameters: [{ $ref: '#/components/parameters/AgentId' }]
      responses:
        '200': { $ref: '#/components/responses/Agent' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      operationId: updateAgent
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAgentRequest' }
      responses:
        '200': { $ref: '#/components/responses/Agent' }
  /v1/agents/{agentId}/versions:
    post:
      operationId: createAgentVersion
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAgentVersionRequest' }
      responses:
        '201': { $ref: '#/components/responses/AgentVersion' }
  /v1/agents/{agentId}/publish:
    post:
      operationId: publishAgent
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [versionId]
              properties:
                versionId: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Agent' }
        '422': { $ref: '#/components/responses/Error' }
  /v1/transcriptions:
    post:
      operationId: createTranscription
      tags: [Providers]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio: { type: string, format: binary }
                agentId: { type: string, format: uuid }
                sttLanguage: { $ref: '#/components/schemas/SttLanguage' }
      responses:
        '200': { $ref: '#/components/responses/Transcription' }
  /v1/responses:
    post:
      operationId: createResponse
      tags: [Providers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateResponseRequest' }
      responses:
        '200': { $ref: '#/components/responses/GeneratedResponse' }
        '400': { $ref: '#/components/responses/Error' }
  /v1/speech:
    post:
      operationId: createSpeech
      tags: [Providers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSpeechRequest' }
      responses:
        '200':
          description: Streamed audio
          headers:
            X-Request-Id: { schema: { type: string } }
            X-Provider: { schema: { type: string } }
          content:
            audio/wav: { schema: { type: string, format: binary } }
            audio/pcm: { schema: { type: string, format: binary } }
  /v1/conversations:
    post:
      operationId: createConversation
      tags: [Conversations]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [agentId, channel]
              properties:
                agentId: { type: string, format: uuid }
                channel: { type: string, enum: [TEXT, BROWSER, SIP, BATCH] }
      responses:
        '201': { $ref: '#/components/responses/Conversation' }
  /v1/conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [Conversations]
      parameters: [{ $ref: '#/components/parameters/ConversationId' }]
      responses:
        '200': { $ref: '#/components/responses/Conversation' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      operationId: deleteConversation
      tags: [Conversations]
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { $ref: '#/components/responses/Deletion' }
  /v1/conversations/{conversationId}/transcript:
    get:
      operationId: getTranscript
      tags: [Conversations]
      parameters: [{ $ref: '#/components/parameters/ConversationId' }]
      responses:
        '200':
          description: Ordered transcript
          content:
            application/json:
              schema:
                type: object
                required: [language, segments]
                properties:
                  language: { const: cnr }
                  segments:
                    type: array
                    items: { $ref: '#/components/schemas/TranscriptSegment' }
  /v1/conversations/{conversationId}/events:
    get:
      operationId: streamConversationEvents
      tags: [Conversations]
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: Last-Event-ID
          in: header
          schema: { type: string }
      responses:
        '200':
          description: Resumable normalized event stream
          content:
            text/event-stream:
              schema: { type: string }
  /v1/conversations/{conversationId}/handoff:
    post:
      operationId: requestHandoff
      tags: [Conversations]
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '202': { $ref: '#/components/responses/Handoff' }
  /v1/conversations/{conversationId}/tool-invocations/{invocationId}/confirm:
    post:
      operationId: confirmToolInvocation
      tags: [Tools]
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: invocationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [confirmed, confirmationText]
              properties:
                confirmed: { type: boolean }
                confirmationText: { type: string, minLength: 1, maxLength: 500 }
      responses:
        '200': { $ref: '#/components/responses/ToolInvocation' }
  /v1/agents/{agentId}/realtime-sessions:
    post:
      operationId: createRealtimeSession
      tags: [Conversations]
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                participantName: { type: string, maxLength: 100 }
      responses:
        '201':
          description: LiveKit session credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RealtimeSession' }
  /v1/agents/{agentId}/calls:
    post:
      operationId: createCall
      tags: [Conversations]
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [to]
              properties:
                to: { type: string, pattern: '^\\+[1-9][0-9]{7,14}$' }
      responses:
        '202': { $ref: '#/components/responses/Conversation' }
  /v1/knowledge/bases:
    get:
      operationId: listKnowledgeBases
      tags: [Knowledge]
      responses:
        '200':
          description: Knowledge bases
    post:
      operationId: createKnowledgeBase
      tags: [Knowledge]
      responses:
        '201':
          description: Created knowledge base
  /v1/knowledge/bases/{knowledgeBaseId}/assignments:
    get:
      operationId: listKnowledgeBaseAssignments
      tags: [Knowledge]
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Agent assignments
  /v1/knowledge/retrieve/test:
    post:
      operationId: testKnowledgeRetrieval
      tags: [Knowledge]
      responses:
        '200':
          description: Retrieval test results
  /v1/knowledge/ingestion-jobs/{jobId}:
    get:
      operationId: getIngestionJob
      tags: [Knowledge]
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ingestion job status
  /v1/knowledge/documents:
    get:
      operationId: listKnowledgeDocuments
      tags: [Knowledge]
      responses:
        '200': { $ref: '#/components/responses/DocumentList' }
    post:
      operationId: createKnowledgeDocument
      tags: [Knowledge]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [knowledgeBaseId, title, file]
              properties:
                knowledgeBaseId: { type: string, format: uuid }
                agentId: { type: string, format: uuid }
                title: { type: string, minLength: 1, maxLength: 300 }
                file: { type: string, format: binary }
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [agentId, title, text]
              properties:
                agentId: { type: string, format: uuid }
                title: { type: string, minLength: 1, maxLength: 300 }
                text: { type: string, minLength: 1 }
                sourceUrl: { type: string, format: uri }
      responses:
        '202': { $ref: '#/components/responses/Document' }
  /v1/knowledge/documents/{documentId}:
    delete:
      operationId: deleteKnowledgeDocument
      tags: [Knowledge]
      parameters:
        - name: documentId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { $ref: '#/components/responses/Deletion' }
  /v1/tools:
    get:
      operationId: listTools
      tags: [Tools]
      responses:
        '200': { $ref: '#/components/responses/ToolList' }
    post:
      operationId: createTool
      tags: [Tools]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ToolDefinition' }
      responses:
        '201': { $ref: '#/components/responses/Tool' }
  /v1/tools/{toolId}:
    patch:
      operationId: updateTool
      tags: [Tools]
      parameters:
        - name: toolId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ToolDefinition' }
      responses:
        '200': { $ref: '#/components/responses/Tool' }
  /v1/evaluations/runs:
    post:
      operationId: createEvaluationRun
      tags: [Evaluations]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateEvaluationRunRequest' }
      responses:
        '202': { $ref: '#/components/responses/EvaluationRun' }
  /v1/evaluations/runs/{runId}:
    get:
      operationId: getEvaluationRun
      tags: [Evaluations]
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/EvaluationRun' }
  /v1/usage:
    get:
      operationId: getUsage
      tags: [Providers]
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Usage grouped by provider and operation
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Usage' }
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: Authorization
    sessionCookie:
      type: apiKey
      in: cookie
      name: montenegrina_session
  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 200 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, requestId, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
            retryable: { type: boolean }
            details: { type: object, additionalProperties: true }
    Language:
      type: string
      const: cnr
    MembershipRole:
      type: string
      enum: [OWNER, ADMIN, DEVELOPER, VIEWER]
    SttLanguage:
      type: string
      enum: [sr, hr, bs, multi]
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12, maxLength: 200 }
    Session:
      type: object
      additionalProperties: false
      required: [user, csrfToken]
      properties:
        user: { $ref: '#/components/schemas/User' }
        csrfToken: { type: string }
    User:
      type: object
      additionalProperties: false
      required: [id, email, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        createdAt: { type: string, format: date-time }
    Organization:
      type: object
      additionalProperties: false
      required: [id, name, slug, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        createdAt: { type: string, format: date-time }
    CreateOrganizationRequest:
      type: object
      additionalProperties: false
      required: [name, slug]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        slug: { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,62}$' }
    Membership:
      type: object
      additionalProperties: false
      required: [id, organizationId, userId, role]
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        role: { $ref: '#/components/schemas/MembershipRole' }
    CreateApiKeyRequest:
      type: object
      additionalProperties: false
      required: [name, environment, permissions]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        environment: { type: string, enum: [development, staging, production] }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string }
    ApiKeyCreated:
      type: object
      additionalProperties: false
      required: [id, prefix, key]
      properties:
        id: { type: string, format: uuid }
        prefix: { type: string }
        key: { type: string, description: Returned once and never stored verbatim. }
    Agent:
      type: object
      additionalProperties: false
      required: [id, organizationId, name, slug, language, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        language: { $ref: '#/components/schemas/Language' }
        publishedVersionId: { type: [string, 'null'], format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateAgentRequest:
      type: object
      additionalProperties: false
      required: [name, slug]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        slug: { type: string, pattern: '^[a-z0-9][a-z0-9-]{1,62}$' }
        description: { type: string, maxLength: 1000 }
    UpdateAgentRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 1000 }
    AgentVersion:
      type: object
      additionalProperties: false
      required: [id, agentId, version, status, config, createdAt]
      properties:
        id: { type: string, format: uuid }
        agentId: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        status: { type: string, enum: [DRAFT, PUBLISHED, RETIRED] }
        config: { $ref: '#/components/schemas/AgentConfiguration' }
        createdAt: { type: string, format: date-time }
    CreateAgentVersionRequest:
      type: object
      additionalProperties: false
      required: [config]
      properties:
        config: { $ref: '#/components/schemas/AgentConfiguration' }
    AgentConfiguration:
      type: object
      additionalProperties: false
      required: [systemPrompt, languageProfile, routingPolicy, retention]
      properties:
        systemPrompt: { type: string, minLength: 1, maxLength: 20000 }
        languageProfile:
          type: object
          additionalProperties: false
          required: [script, ijekavian]
          properties:
            script: { type: string, enum: [LATIN, CYRILLIC] }
            ijekavian: { type: boolean }
            glossaryIds: { type: array, items: { type: string, format: uuid } }
            pronunciationIds: { type: array, items: { type: string, format: uuid } }
        routingPolicy:
          type: object
          additionalProperties: false
          required: [mode, pipelineMode]
          properties:
            mode: { type: string, enum: [real] }
            pipelineMode: { type: string, enum: [controlled, direct_realtime] }
            sttLanguage: { $ref: '#/components/schemas/SttLanguage' }
            llmModel: { type: string }
            ttsModel: { type: string }
            realtimeModel: { type: string }
            fallbackAllowed: { type: boolean, default: true }
            allowedProviders: { type: array, items: { type: string } }
            allowedRegions: { type: array, items: { type: string } }
        retention:
          type: object
          additionalProperties: false
          required: [transcriptDays, recordAudio]
          properties:
            transcriptDays: { type: integer, minimum: 0, maximum: 3650 }
            recordAudio: { type: boolean }
            audioDays: { type: integer, minimum: 0, maximum: 3650 }
        toolIds: { type: array, items: { type: string, format: uuid } }
        knowledgeSourceIds: { type: array, items: { type: string, format: uuid } }
        knowledgeBaseIds: { type: array, items: { type: string, format: uuid } }
        sensitiveWritesEnabled: { type: boolean, default: false }
    Transcription:
      type: object
      additionalProperties: false
      required: [language, originalText, normalizedText, warnings, provider]
      properties:
        language: { $ref: '#/components/schemas/Language' }
        originalText: { type: string }
        normalizedText: { type: string }
        warnings: { type: array, items: { type: string } }
        provider: { $ref: '#/components/schemas/ProviderSummary' }
    CreateResponseRequest:
      type: object
      additionalProperties: false
      required: [agentId, input]
      properties:
        agentId: { type: string, format: uuid }
        conversationId: { type: string, format: uuid }
        input: { type: string, minLength: 1, maxLength: 50000 }
        stream: { type: boolean, default: false }
    GeneratedResponse:
      type: object
      additionalProperties: false
      required: [language, text, originalText, warnings, citations, provider]
      properties:
        language: { $ref: '#/components/schemas/Language' }
        text: { type: string }
        originalText: { type: string }
        warnings: { type: array, items: { type: string } }
        citations: { type: array, items: { $ref: '#/components/schemas/Citation' } }
        provider: { $ref: '#/components/schemas/ProviderSummary' }
    CreateSpeechRequest:
      type: object
      additionalProperties: false
      required: [agentId, text]
      properties:
        agentId: { type: string, format: uuid }
        text: { type: string, minLength: 1, maxLength: 10000 }
        format: { type: string, enum: [wav, pcm], default: wav }
    ProviderSummary:
      type: object
      additionalProperties: false
      required: [provider, model, latencyMs, usage]
      properties:
        provider: { type: string }
        model: { type: string }
        latencyMs: { type: integer, minimum: 0 }
        usage: { $ref: '#/components/schemas/Usage' }
        fallbackHistory:
          type: array
          items:
            type: object
            required: [provider, code]
            properties:
              provider: { type: string }
              code: { type: string }
              retryable: { type: boolean }
    Usage:
      type: object
      additionalProperties: false
      properties:
        provider: { type: string }
        operation: { type: string }
        inputTokens: { type: integer, minimum: 0 }
        outputTokens: { type: integer, minimum: 0 }
        audioInputSeconds: { type: number, minimum: 0 }
        audioOutputSeconds: { type: number, minimum: 0 }
        characters: { type: integer, minimum: 0 }
        estimatedCostUsd: { type: number, minimum: 0 }
    Conversation:
      type: object
      additionalProperties: false
      required: [id, organizationId, agentId, channel, state, language, startedAt]
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        agentId: { type: string, format: uuid }
        channel: { type: string, enum: [TEXT, BROWSER, SIP, BATCH] }
        state: { $ref: '#/components/schemas/ConversationState' }
        language: { $ref: '#/components/schemas/Language' }
        startedAt: { type: string, format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
    ConversationState:
      type: string
      enum: [INITIALIZING, LISTENING, TRANSCRIBING, THINKING, TOOL_PENDING, SPEAKING, INTERRUPTED, HANDOFF_PENDING, HANDED_OFF, COMPLETED, FAILED]
    TranscriptSegment:
      type: object
      additionalProperties: false
      required: [id, speaker, originalText, normalizedText, startedAtMs, final]
      properties:
        id: { type: string, format: uuid }
        speaker: { type: string, enum: [USER, ASSISTANT, HUMAN] }
        originalText: { type: string }
        normalizedText: { type: string }
        startedAtMs: { type: integer, minimum: 0 }
        endedAtMs: { type: integer, minimum: 0 }
        final: { type: boolean }
    RealtimeSession:
      type: object
      additionalProperties: false
      required: [conversationId, roomName, participantToken, livekitUrl, expiresAt, language]
      properties:
        conversationId: { type: string, format: uuid }
        roomName: { type: string }
        participantToken: { type: string }
        livekitUrl: { type: string }
        expiresAt: { type: string, format: date-time }
        language: { $ref: '#/components/schemas/Language' }
    Citation:
      type: object
      additionalProperties: false
      required: [documentId, documentVersionId, chunkId, title]
      properties:
        documentId: { type: string, format: uuid }
        documentVersionId: { type: string, format: uuid }
        chunkId: { type: string, format: uuid }
        title: { type: string }
        page: { type: integer, minimum: 1 }
        section: { type: string }
        score: { type: number }
    Document:
      type: object
      additionalProperties: false
      required: [id, title, status, version, createdAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { type: string, enum: [UPLOADED, SCANNING, PROCESSING, READY, FAILED, QUARANTINED, DELETING] }
        version: { type: integer, minimum: 1 }
        errorCode: { type: string }
        createdAt: { type: string, format: date-time }
    ToolDefinition:
      type: object
      additionalProperties: false
      required: [name, version, description, riskClass, handler, inputSchema]
      properties:
        name: { type: string, pattern: '^[a-z][a-z0-9_]{1,62}$' }
        version: { type: integer, minimum: 1 }
        description: { type: string, minLength: 1, maxLength: 500 }
        riskClass: { type: string, enum: [READ_PUBLIC, READ_CUSTOMER, WRITE_REVERSIBLE, WRITE_SENSITIVE] }
        handler: { type: string, enum: [sandbox.product_lookup, sandbox.appointment_availability, sandbox.appointment_create, sandbox.request_status, sandbox.handoff, fixed_https] }
        inputSchema: { type: object, additionalProperties: true }
        outputSchema: { type: object, additionalProperties: true }
        connectorConfig: { type: object, additionalProperties: true }
        enabled: { type: boolean, default: true }
    Tool:
      allOf:
        - $ref: '#/components/schemas/ToolDefinition'
        - type: object
          required: [id, organizationId]
          properties:
            id: { type: string, format: uuid }
            organizationId: { type: string, format: uuid }
    ToolInvocation:
      type: object
      additionalProperties: false
      required: [id, conversationId, toolId, status, input]
      properties:
        id: { type: string, format: uuid }
        conversationId: { type: string, format: uuid }
        toolId: { type: string, format: uuid }
        status: { type: string, enum: [PROPOSED, AWAITING_CONFIRMATION, RUNNING, COMPLETED, REJECTED, FAILED] }
        input: { type: object, additionalProperties: true }
        result: { type: object, additionalProperties: true }
        errorCode: { type: string }
    Handoff:
      type: object
      additionalProperties: false
      required: [id, conversationId, status, requestedAt]
      properties:
        id: { type: string, format: uuid }
        conversationId: { type: string, format: uuid }
        status: { type: string, enum: [REQUESTED, ACCEPTED, COMPLETED, FAILED] }
        requestedAt: { type: string, format: date-time }
    Deletion:
      type: object
      additionalProperties: false
      required: [id, status]
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [QUEUED, RUNNING, COMPLETED, FAILED] }
    CreateEvaluationRunRequest:
      type: object
      additionalProperties: false
      required: [datasetId, variants]
      properties:
        datasetId: { type: string, format: uuid }
        variants:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, pipeline]
            properties:
              name: { type: string }
              pipeline: { type: string, enum: [text, realtime] }
              sttLanguage: { $ref: '#/components/schemas/SttLanguage' }
              promptVersionId: { type: string, format: uuid }
              voiceId: { type: string }
              endpointing: { type: object, additionalProperties: true }
    EvaluationRun:
      type: object
      additionalProperties: false
      required: [id, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [QUEUED, RUNNING, COMPLETED, FAILED] }
        reportUrl: { type: string, format: uri }
        metrics: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
  responses:
    Error:
      description: Typed error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Health:
      description: Health status
      content:
        application/json:
          schema:
            type: object
            required: [status, timestamp]
            properties:
              status: { type: string, enum: [ok, degraded] }
              timestamp: { type: string, format: date-time }
              checks: { type: object, additionalProperties: { type: string } }
    Session:
      description: Browser session
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Session' }
    Organization:
      description: Organization
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Organization' }
    OrganizationList:
      description: Organizations
      content:
        application/json:
          schema:
            type: object
            required: [items]
            properties:
              items: { type: array, items: { $ref: '#/components/schemas/Organization' } }
    Agent:
      description: Agent
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Agent' }
    AgentList:
      description: Agents
      content:
        application/json:
          schema:
            type: object
            required: [items]
            properties:
              items: { type: array, items: { $ref: '#/components/schemas/Agent' } }
              nextCursor: { type: string }
    AgentVersion:
      description: Immutable agent version
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AgentVersion' }
    Transcription:
      description: Normalized transcription
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Transcription' }
    GeneratedResponse:
      description: Montenegrin response
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GeneratedResponse' }
    Conversation:
      description: Conversation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Conversation' }
    Document:
      description: Knowledge document
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Document' }
    DocumentList:
      description: Knowledge documents
      content:
        application/json:
          schema:
            type: object
            required: [items]
            properties:
              items: { type: array, items: { $ref: '#/components/schemas/Document' } }
    Tool:
      description: Tool definition
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Tool' }
    ToolList:
      description: Tool definitions
      content:
        application/json:
          schema:
            type: object
            required: [items]
            properties:
              items: { type: array, items: { $ref: '#/components/schemas/Tool' } }
    ToolInvocation:
      description: Tool invocation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ToolInvocation' }
    Handoff:
      description: Handoff
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Handoff' }
    Deletion:
      description: Asynchronous deletion
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Deletion' }
    EvaluationRun:
      description: Evaluation run
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EvaluationRun' }
